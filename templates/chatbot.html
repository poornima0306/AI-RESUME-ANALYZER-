{% extends "base.html" %}

{% block content %}

<h1>AI Chatbot 🤖</h1>

<form method="POST" action="{{ url_for('chatbot') }}">

    <textarea name="message" placeholder="Ask something..." required></textarea>

    <button type="submit">Ask AI</button>

</form>

{% if user_message %}
<div>
    <h3>You:</h3>
    <p>{{ user_message }}</p>
</div>
{% endif %}

{% if reply %}
<div>
    <h3>AI:</h3>
    <p>{{ reply }}</p>
</div>
{% endif %}

{% endblock %}
