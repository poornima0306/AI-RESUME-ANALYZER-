{% extends "base.html" %}

{% block content %}

<h1>Admin Dashboard 👑</h1>

<h2>Users</h2>
<ul>
{% for user in users %}
    <li>{{ user.username }} - {{ user.email }}</li>
{% endfor %}
</ul>

<h2>Reports</h2>
<ul>
{% for r in reports %}
    <li>{{ r.resume_name }} - {{ r.final_score }}%</li>
{% endfor %}
</ul>

{% endblock %}
