{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Login</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <p style="text-align:center;">
        Don't have an account?
        <a href="{{ url_for('register') }}">
            Register
        </a>
    </p>

</div>

{% endblock %}
