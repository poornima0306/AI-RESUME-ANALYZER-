<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Register</h1>

    <form method="POST">

        <input
            type="user"
            name="username"
            placeholder="Username"
        >
        <input type="email"
               name="email"
               placeholder="Enter Email">

        <input
            type="password"
            name="password"
            placeholder="Password"
        >

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/login">
        Already have account? Login
    </a>

</div>

</body>
</html>
